<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaca Mağaza Ziyaret Checklist</title>
    <!-- Kütüphaneler -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clay: '#A18E7F',
                        ink: '#141414',
                        paper: '#FDFCFB'
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FDFCFB; color: #141414; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #A18E7F; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Yapılandırma ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbz1NcbGha1VuzwZ-j7zUiTVohL0ZXhYa1zN6msLvkRiZ5_wMiWPZ8dyjnVDa1E8jwIT/exec';

        const STORES = [
            { id: '1', name: 'Karaca Home - Zorlu Center', location: 'İstanbul' },
            { id: '2', name: 'Karaca - İstinye Park', location: 'İstanbul' },
            { id: '3', name: 'Karaca - Ankara Panora', location: 'Ankara' },
            { id: '4', name: 'Karaca - İzmir İstinyePark', location: 'İzmir' },
            { id: '5', name: 'Karaca Home - Emaar Square', location: 'İstanbul' },
        ];

        const CHECKLIST_TEMPLATE = [
            { id: '1', category: 'Mağaza Dış Görünüm', question: 'Mağaza dış cephe ve logolar temiz ve aydınlık mı?' },
            { id: '2', category: 'Mağaza Dış Görünüm', question: 'Vitrin düzeni güncel kampanya ile uyumlu mu?' },
            { id: '3', category: 'Mağaza Düzeni', question: 'Reyon geçişleri müşteri sirkülasyonuna uygun mu?' },
            { id: '4', category: 'Mağaza Düzeni', question: 'Ürün etiketleri eksiksiz ve doğru mu?' },
            { id: '5', category: 'Ürün Teşhir', question: 'Yeni gelen ürünler odak noktalarda sergileniyor mu?' },
            { id: '6', category: 'Ürün Teşhir', question: 'Stokta olmayan ürünlerin teşhiri kaldırılmış mı?' },
            { id: '7', category: 'Personel', question: 'Personel kılık kıyafet yönetmeliğine uygun mu?' },
            { id: '8', category: 'Personel', question: 'Personel müşteri karşılama standartlarını uyguluyor mu?' },
            { id: '9', category: 'Hijyen & Güvenlik', question: 'Mağaza genel temizliği yeterli mi?' },
            { id: '10', category: 'Hijyen & Güvenlik', question: 'Güvenlik ekipmanları erişilebilir mi?' },
        ];

        function App() {
            const [step, setStep] = useState('selection');
            const [selectedStore, setSelectedStore] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [regionalManager, setRegionalManager] = useState('HASAN AYDIN');
            const [storeManager, setStoreManager] = useState('');
            const [visitStats, setVisitStats] = useState({ monthly: 0, yearly: 0 });
            const [isLoadingStats, setIsLoadingStats] = useState(false);
            const [checklist, setChecklist] = useState(CHECKLIST_TEMPLATE.map(i => ({ ...i, answer: null, description: '' })));
            const [generalObservation, setGeneralObservation] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);

            const filteredStores = STORES.filter(s => s.name.toLowerCase().includes(searchQuery.toLowerCase()));

            const handleStoreSelect = async (store) => {
                setSelectedStore(store);
                setIsLoadingStats(true);
                try {
                    const res = await fetch(`${API_URL}?action=getStats&store=${encodeURIComponent(store.name)}`);
                    const stats = await res.json();
                    setVisitStats(stats);
                } catch (e) {
                    console.error("İstatistik hatası:", e);
                } finally {
                    setIsLoadingStats(false);
                }
            };

            const handleAnswer = (id, ans) => {
                setChecklist(prev => prev.map(item => item.id === id ? { ...item, answer: ans } : item));
            };

            const handleSubmit = async () => {
                setIsSubmitting(true);
                const reportData = {
                    tarih: new Date().toLocaleDateString('tr-TR'),
                    bolgeMuduru: regionalManager,
                    magaza: selectedStore.name,
                    magazaMuduru: storeManager,
                    aylikZiyaret: `${visitStats.monthly + 1}. Ziyaret`,
                    yillikZiyaret: `${visitStats.yearly + 1}. Ziyaret`,
                    evet: checklist.filter(i => i.answer === 'yes').length,
                    hayir: checklist.filter(i => i.answer === 'no').length,
                    notlar: generalObservation,
                    uyum: `%${Math.round((checklist.filter(i => i.answer === 'yes').length / checklist.length) * 100)}`
                };

                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reportData) });
                    setShowSuccess(true);
                } catch (e) {
                    alert("Hata oluştu!");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (showSuccess) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-center">
                        <div className="max-w-md space-y-6">
                            <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto">
                                <i data-lucide="check-circle-2" className="w-12 h-12 text-green-600"></i>
                            </div>
                            <h1 className="text-3xl font-serif">Rapor Gönderildi!</h1>
                            <p className="text-gray-600">Veriler Sheete kaydedildi ve PDF oluşturuldu.</p>
                            <button onClick={() => window.location.reload()} className="w-full py-4 bg-ink text-white rounded-xl font-bold">Yeni Denetim</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-3xl mx-auto p-6">
                    <header className="flex items-center justify-between mb-12">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-ink text-white flex items-center justify-center rounded-lg font-serif font-bold text-xl">K</div>
                            <div>
                                <h1 className="text-lg font-bold tracking-tight">KARACA</h1>
                                <p className="text-[10px] uppercase tracking-widest text-gray-500">Züccaciye Denetim</p>
                            </div>
                        </div>
                    </header>

                    {step === 'selection' ? (
                        <div className="space-y-8">
                            <div className="text-center">
                                <h2 className="text-3xl font-serif mb-2">Mağaza Seçimi</h2>
                                <p className="text-gray-500">Denetim yapılacak mağazayı seçin.</p>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs font-bold uppercase text-gray-400">Bölge Müdürü</label>
                                    <input value={regionalManager} onChange={e => setRegionalManager(e.target.value)} className="w-full p-3 border rounded-xl mt-1" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold uppercase text-gray-400">Mağaza Müdürü</label>
                                    <input value={storeManager} onChange={e => setStoreManager(e.target.value)} className="w-full p-3 border rounded-xl mt-1" placeholder="İsim giriniz..." />
                                </div>
                            </div>

                            <input placeholder="Mağaza ara..." className="w-full p-4 border-2 rounded-2xl text-lg" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />

                            <div className="space-y-3">
                                {filteredStores.map(store => (
                                    <div key={store.id} onClick={() => handleStoreSelect(store)} className={`p-4 border rounded-2xl cursor-pointer transition-all ${selectedStore?.id === store.id ? 'border-clay bg-clay/5' : 'hover:border-clay'}`}>
                                        <h3 className="font-serif text-lg">{store.name}</h3>
                                        <p className="text-sm text-gray-400">{store.location}</p>
                                    </div>
                                ))}
                            </div>

                            {selectedStore && (
                                <div className="bg-ink text-white p-6 rounded-2xl flex items-center justify-between">
                                    <div>
                                        <p className="text-[10px] uppercase opacity-60">Sıradaki Ziyaret</p>
                                        <p className="text-2xl font-serif text-clay">{isLoadingStats ? '...' : `${visitStats.monthly + 1}. Ziyaret`}</p>
                                    </div>
                                    <button onClick={() => setStep('checklist')} className="bg-clay px-6 py-3 rounded-xl font-bold">Başlat</button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="space-y-8 pb-24">
                            <button onClick={() => setStep('selection')} className="text-clay font-bold flex items-center gap-2">← Geri Dön</button>
                            <h2 className="text-2xl font-serif">{selectedStore.name}</h2>

                            {checklist.map(item => (
                                <div key={item.id} className="p-6 border rounded-2xl space-y-4">
                                    <p className="text-lg">{item.question}</p>
                                    <div className="flex gap-3">
                                        <button onClick={() => handleAnswer(item.id, 'yes')} className={`flex-1 py-3 rounded-xl font-bold ${item.answer === 'yes' ? 'bg-green-600 text-white' : 'border'}`}>Evet</button>
                                        <button onClick={() => handleAnswer(item.id, 'no')} className={`flex-1 py-3 rounded-xl font-bold ${item.answer === 'no' ? 'bg-red-600 text-white' : 'border'}`}>Hayır</button>
                                    </div>
                                </div>
                            ))}

                            <div className="space-y-2">
                                <label className="font-bold">Genel Gözlem (En az 20 karakter)</label>
                                <textarea value={generalObservation} onChange={e => setGeneralObservation(e.target.value)} className="w-full p-4 border rounded-2xl h-32" placeholder="Notlarınızı yazın..." />
                            </div>

                            <button 
                                disabled={isSubmitting || generalObservation.length < 20} 
                                onClick={handleSubmit} 
                                className="fixed bottom-6 left-6 right-6 bg-ink text-white py-4 rounded-2xl font-bold shadow-2xl disabled:opacity-50"
                            >
                                {isSubmitting ? 'Gönderiliyor...' : 'Raporu Tamamla ve Gönder'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // İkonları yükle
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
