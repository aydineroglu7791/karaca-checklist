<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Karaca Züccaciye – Mağaza Ziyaret Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --bg:#f4f0eb;--white:#fff;
  --clay:#c8a97e;--clay-l:#e8d5bb;--clay-d:#9c7a52;
  --ink:#1e1a16;--ink-s:#8a7a6a;
  --bdr:#ddd4c6;
  --grn:#3d7a5a;--grn-b:#edf7f2;
  --red:#b84040;--red-b:#fdf0f0;
  --ylw:#fdf8ee;
  --s1:0 2px 12px rgba(30,26,22,.07);
  --s2:0 6px 28px rgba(30,26,22,.12);
  --s3:0 20px 60px rgba(30,26,22,.22);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{-webkit-tap-highlight-color:transparent}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--ink);padding-bottom:100px}

/* ─ HEADER ─ */
.hdr{background:var(--ink);position:relative;overflow:hidden}
.hdr-in{max-width:980px;margin:0 auto;padding:36px 20px 28px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px}
.hdr h1{font-family:'Playfair Display',serif;font-size:28px;color:#fff;line-height:1.2}
.hdr h1 em{color:var(--clay);font-style:italic}
.hdr-date{background:rgba(200,169,126,.1);border:1px solid rgba(200,169,126,.22);border-radius:10px;padding:9px 16px;text-align:center}
.hdr-date .dt{font-family:'Playfair Display',serif;font-size:16px;color:var(--clay-l)}

/* ─ WRAPPER ─ */
.W{max-width:980px;margin:0 auto;padding:0 12px}

/* ─ KART SİSTEMİ ─ */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--s2);overflow:hidden;margin-top:18px}
.card-hd{background:linear-gradient(135deg,var(--ink),#2d261e);padding:14px 20px;color:#fff}
.card-hd h2{font-family:'Playfair Display',serif;font-size:15px}
.card-body{padding:20px}

/* ─ FORM ALANLARI ─ */
.mg{display:grid;gap:13px;margin-bottom:13px}
.mg3{grid-template-columns:1fr 1fr 1fr}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:10px;font-weight:700;color:var(--ink-s);text-transform:uppercase;letter-spacing:1px}
.fld input,.fld select,.fld textarea{border:1.5px solid var(--bdr);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--bg);outline:none;appearance:none;transition:0.2s}
.fld input:focus,.fld select:focus{border-color:var(--clay);background:#fff}

/* ─ PROGRESS ─ */
.prog{background:var(--white);border-radius:var(--r);padding:15px 20px;margin-top:14px;display:flex;align-items:center;gap:14px;box-shadow:var(--s1)}
.prog-info{min-width:140px}
.prog-track{flex:1;height:10px;background:var(--bdr);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--clay-d),var(--clay));width:0%;transition:0.4s}
.prog-pct{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--clay)}

/* ─ SORU SATIRI (Düzenlendi) ─ */
.cat{margin-top:14px;border-radius:var(--r);overflow:hidden;box-shadow:var(--s1)}
.cat-hd{background:var(--white);border-bottom:1px solid var(--bdr);padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.cat-txt h3{font-family:'Playfair Display',serif;font-size:14px}
.cat-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--bg)}
.qr{display:grid;grid-template-columns:35px 1fr 95px 65px;border-bottom:1px solid var(--bdr);padding:12px 5px;align-items:center}
.qn{font-weight:700;color:var(--ink-s);text-align:center}
.qt{font-size:13px;line-height:1.4;padding-right:5px}
.yn{display:flex;gap:6px;justify-content:center}
.yb{width:38px;height:38px;border-radius:50%;border:2.2px solid var(--bdr);background:transparent;cursor:pointer;font-weight:700;transition:0.2s}
.yb.y.s{background:var(--grn);border-color:var(--grn);color:#fff}
.yb.n.s{background:var(--red);border-color:var(--red);color:#fff}
.pc{display:flex;justify-content:center}
.cam-btn{width:46px;height:46px;border-radius:10px;border:2px dashed var(--bdr);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.cam-btn.has{border-style:solid;border-color:var(--grn);background:var(--grn-b)}
.cam-input{display:none}
.dc{grid-column:2/4;margin-top:10px}
.dc input{width:100%;border:1.5px solid var(--bdr);border-radius:8px;padding:9px;font-size:13px;background:rgba(200,169,126,0.05)}
.th-wrap{grid-column:2/-1;display:flex;flex-wrap:wrap;margin-top:5px}
.th-wrap img{width:50px;height:50px;border-radius:6px;margin:2px;border:1px solid var(--bdr)}

/* ─ ALT MENÜ & BUTONLAR ─ */
.send-wrap{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:15px}
.mail-card{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--s1)}
.mail-hd{background:#f0ebe3;padding:12px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--ink-s)}
.btn-sub-wrap{display:flex;flex-direction:column;gap:10px}
.btn-row{display:flex;gap:10px}
.btn-preview{flex:1;background:#fff;color:var(--ink);border:1.5px solid var(--clay);padding:12px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;transition:0.2s}
.btn-preview:active{background:var(--ylw)}
.btn-sub{background:linear-gradient(160deg,#1e1a16 0%,#2d261e 100%);color:#fff;border:none;border-radius:var(--r);padding:18px;cursor:pointer;box-shadow:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:0.3s}
.btn-sub:active{transform:scale(0.98)}

/* ─ RAPOR ÖNİZLEME (Görselleştirildi) ─ */
.rpt-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:900;overflow-y:auto;padding:20px 15px}
.rpt-page.on{display:block}
.rpt-inner{max-width:600px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;box-shadow:var(--s3)}
.rpt-hd{background:var(--ink);color:#fff;padding:25px;border-radius:15px;margin-bottom:20px;text-align:center}
.rpt-scores{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:25px}
.rsc{background:#fff;border:1.5px solid var(--bdr);padding:20px 10px;text-align:center;border-radius:15px;box-shadow:var(--s1)}
.rsc .rv{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--clay-d)}
.rsc .rl{font-size:10px;font-weight:900;text-transform:uppercase;color:var(--ink-s);margin-top:5px}

.rpt-cat-item{margin-bottom:15px}
.rpt-cat-info{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;font-weight:700}
.rpt-bar-bg{height:10px;background:#eee;border-radius:10px;overflow:hidden}
.rpt-bar-fill{height:100%;border-radius:10px;transition:1s width}

/* ─ MODALLER ─ */
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}
.sov.on{display:flex}
.smodal{background:#fff;border-radius:20px;width:90%;max-width:400px;overflow:hidden;text-align:center}
.sm-hd{background:var(--ink);padding:30px;color:#fff}
.sm-ft{padding:20px;display:flex;gap:10px}
.btn-smc{flex:1;background:var(--clay);color:#1e1a16;border:none;border-radius:10px;padding:14px;font-weight:700;cursor:pointer}
.btn-smn{flex:1;background:var(--ink);color:#fff;border:none;border-radius:10px;padding:14px;font-weight:700;cursor:pointer}

.spin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:4px solid #fff;border-top-color:var(--clay);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:12px 25px;border-radius:50px;transition:0.3s;z-index:3000;font-size:13px;font-weight:700}
.toast.on{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .mg3{grid-template-columns:1fr}
  .send-wrap{grid-template-columns:1fr}
  .btn-row{flex-direction:column}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div>
      <div class="hdr-logo"><span>✦ Karaca Züccaciye</span></div>
      <h1>Mağaza Ziyaret<br><em>Checklist</em></h1>
    </div>
    <div class="hdr-date"><div class="dt" id="hdrDate">—</div></div>
  </div>
</header>

<div class="W">
  <div class="card">
    <div class="card-hd"><h2>📋 Ziyaret Bilgileri</h2></div>
    <div class="card-body">
      <div class="mg mg3">
        <div class="fld"><label>Bölge Müdürü</label><select id="f-mudur"><option value="">-- Seçiniz --</option><option value="AYDIN EROĞLU">AYDIN EROĞLU</option><option value="BAHRETTİN BAŞAR">BAHRETTİN BAŞAR</option><option value="BAYRAM ERCAN KARINDAŞ">BAYRAM ERCAN KARINDAŞ</option><option value="ENİS NACİ DUĞAN">ENİS NACİ DUĞAN</option><option value="ERMAN KARAKAYA">ERMAN KARAKAYA</option><option value="FERHAT GENCER">FERHAT GENCER</option><option value="HASAN AYDIN">HASAN AYDIN</option><option value="HÜSEYİN ÖZDEMİR">HÜSEYİN ÖZDEMİR</option><option value="MURAT TİRYAKİ">MURAT TİRYAKİ</option><option value="NİYAZİ KUZAN">NİYAZİ KUZAN</option><option value="OSMAN ASKER">OSMAN ASKER</option><option value="SEDAT AYGÜN">SEDAT AYGÜN</option><option value="SERPİL DURAN">SERPİL DURAN</option><option value="TANER DURAK">TANER DURAK</option><option value="TANER PEHLİVAN">TANER PEHLİVAN</option><option value="ŞÜKRÜ ALPER ERGÜN">ŞÜKRÜ ALPER ERGÜN</option></select></div>
        <div class="fld"><label>Mağaza Adı</label><select id="f-magaza">
          <option value="">-- Seçiniz --</option>
          <option value="ADA.ADANACADDE-CONT.KRC.2025">ADA.ADANACADDE-CONT.KRC.2025</option>
          <option value="AMS.AMASYA.CADDE.KRC.2025">AMS.AMASYA.CADDE.KRC.2025</option>
          <option value="Afy.Park Krc.2015">Afy.Park Krc.2015</option>
          <option value="Ank.Ankamall Krc.2011">Ank.Ankamall Krc.2011</option>
          <option value="Ist.Optimum Krc.2010">Ist.Optimum Krc.2010</option>
          <option value="Ada.Burda Krc.2019">Ada.Burda Krc.2019</option>
          <option value="Ank.Acity Krc.2014">Ank.Acity Krc.2014</option>
          <option value="Izm.Agora Krc.2010">Izm.Agora Krc.2010</option>
          <option value="Mrs.Saya Park Krc.2020">Mrs.Saya Park Krc.2020</option>
          <option value="Sms.Piazza Krc.2013">Sms.Piazza Krc.2013</option>
          <option value="Trb.Forum Krc.2010">Trb.Forum Krc.2010</option>
        </select></div>
        <div class="fld"><label>Mağaza Müdürü</label><input type="text" id="f-mag-mudur" placeholder="Sorumlu kişi"></div>
      </div>
      <div class="mg mg2">
        <div class="fld"><label>Ziyaret Tarihi & Saati</label><div id="f-tarih-display" style="background:#f0ebe3; padding:10px; border-radius:8px">—</div><input type="hidden" id="f-tarih"></div>
        <div class="fld"><label>Bu Yıl Kaçıncı Ziyaret</label><div id="f-sira-display" style="background:#f0ebe3; padding:10px; border-radius:8px">Hesaplanıyor...</div><input type="hidden" id="f-sira"></div>
      </div>
    </div>
  </div>

  <div class="prog">
    <div class="prog-info"><div class="prog-lbl">Tamamlanma</div><div class="prog-num"><span id="ansCnt">0</span><small> / 10</small></div></div>
    <div class="prog-track"><div class="prog-fill" id="pFill"></div></div>
    <div class="prog-pct" id="pPct">%0</div>
  </div>

  <div id="catWrap"></div>

  <div class="notes-card">
    <div class="notes-hd">📝 Genel Gözlem & Aksiyon Planı</div>
    <div class="notes-bd"><textarea id="f-notlar" placeholder="Gözlemler, öneriler, acil aksiyonlar… (En az 20 karakter)" style="width:100%; min-height:80px; border:1.5px solid var(--bdr); border-radius:8px; padding:12px"></textarea></div>
  </div>

  <div class="send-wrap">
    <div class="mail-card">
      <div class="mail-hd">✉️ Rapor Gönderilecek Kişiler</div>
      <div class="mail-bd">
        <div class="chips" id="chips"></div>
        <div style="display:flex; gap:7px"><input type="email" id="mailInp" placeholder="ad@karaca.com" style="flex:1; border:1.5px solid var(--bdr); border-radius:8px; padding:10px"><button onclick="addMail()" style="background:var(--clay); border:none; border-radius:8px; padding:0 15px; cursor:pointer; font-weight:bold">+</button></div>
      </div>
    </div>
    <div class="btn-sub-wrap">
      <div class="btn-row">
        <button class="btn-preview" onclick="showReport()">📊 Raporu Önizle</button>
        <button class="btn-preview" onclick="resetFormWithConfirm()" style="border-color:#aaa; color:#777">♻️ Formu Temizle</button>
      </div>
      <button class="btn-sub" onclick="submitForm()"><span class="bi" style="font-size:24px; margin-bottom:5px">📨</span><span style="font-weight:700">Formu Tamamla</span><span style="font-size:10px; opacity:0.8">& Raporu Gönder</span></button>
    </div>
  </div>
</div>

<div class="rpt-page" id="rptPage">
  <div class="rpt-inner" id="rptInner"></div>
</div>

<div class="sov" id="succOv">
  <div class="smodal">
    <div class="sm-hd"><h2>✅ Rapor Gönderildi!</h2><p>Drive ve Sheets kaydı tamamlandı.</p></div>
    <div class="sm-ft">
      <button class="btn-smc" onclick="document.getElementById('succOv').classList.remove('on')">Kapat</button>
      <button class="btn-smn" onclick="location.reload()">Yeni Form</button>
    </div>
  </div>
</div>

<div class="spin-ov" id="spinOv"><div class="spinner"></div><div style="color:#fff; margin-top:10px">Yükleniyor...</div></div>
<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  sheets_url: 'https://script.google.com/macros/s/AKfycbxlaoRObf7GCVmLPbom4ye_k5-K1VMMUNQQ2Z4Met5EaK70jg2MCRneygao4pHTiJU-/exec',
  default_mails: [{a:'aydin.eroglu@karaca.com'}, {a:'operasyon@karaca.com'}]
};

var CATS = [
  {id:'c1',icon:'🏬',col:'#e8f4fd',icol:'#2980b9', title:'Mağaza Dış Görünüm ve Genel Alanlar', questions:[
    {t:'Dış cephe temiz ve düzenli mi? Tabela ışıkları yanıyor mu?'},
    {t:'Mağaza yürüyüş alanı düzenli mi? (Koli/ürün bulunmuyor ve zemin temiz.)'},
    {t:'Mağaza içi depolama alanları düzenli mi? Depo standartlara uygun mu?'},
    {t:'Kasa bölgesi temiz ve düzenli mi?'},
    {t:'Mağazada yeterli sarf malzeme mevcut mu?'},
  ]},
  {id:'c2',icon:'💰',col:'#fef9ee',icol:'#c9a84c', title:'Kasa, Finans ve Evrak İşlemleri', questions:[
    {t:'Kasa nakiti tutarlı mı? Gider pusulaları prosedüre uygun mu?'},
    {t:'Para yatırma şirket prosedürüne uygun yapılıyor mu?'},
    {t:'Masraflar BM onaylı ve prosedüre uygun işlenmiş mi?'},
    {t:'Sevkiyatların kabulü yapılmış mı? İrsaliyeler imzalı muhafaza ediliyor mu?'},
    {t:'Mağazalar arası transfer irsaliyeleri imzalanıp dosyalanıyor mu?'},
  ]},
];

var ANS={}, DESC={}, PHOTOS={}, mailList = CONFIG.default_mails.map(m=>({a:m.a}));

function render(){
  var wrap = document.getElementById('catWrap'); wrap.innerHTML = '';
  CATS.forEach(cat => {
    var div = document.createElement('div'); div.className='cat';
    let qRows = '';
    cat.questions.forEach((q,i) => {
      var qid = cat.id+'-'+i;
      qRows += `<div class="qr" id="r-${qid}">
        <div class="qn">${i+1}</div>
        <div class="qt">${q.t}</div>
        <div class="yn"><button class="yb y" onclick="setA('${qid}','yes')">E</button><button class="yb n" onclick="setA('${qid}','no')">H</button></div>
        <div class="pc"><div class="cam-btn" id="cb-${qid}" onclick="triggerCam('${qid}')">📷</div><input type="file" class="cam-input" id="fi-${qid}" accept="image/*" capture="environment" onchange="addPhoto(this,'${qid}')"></div>
        <div class="dc"><input type="text" placeholder="Açıklama zorunlu..." oninput="DESC['${qid}']=this.value"></div>
        <div id="th-${qid}" class="th-wrap"></div>
      </div>`;
    });
    div.innerHTML = `<div class="cat-hd open" onclick="toggleCat(this,'${cat.id}')"><div class="cat-hd-in"><div class="cat-dot" style="background:${cat.col};color:${cat.icol}">${cat.icon}</div><div class="cat-txt"><h3>${cat.title}</h3></div><div class="cat-pill" id="pill-${cat.id}">0/${cat.questions.length}</div><span class="cat-chev">▾</span></div></div><div class="cat-bd open" id="bd-${cat.id}"><div class="th-row"><span>#</span><span>Madde</span><span style="text-align:center">Cevap</span><span style="text-align:center">Foto</span></div>${qRows}</div>`;
    wrap.appendChild(div);
  });
  renderChips();
}

function setA(qid,val){
  ANS[qid]=val;
  var row = document.getElementById('r-'+qid);
  row.classList.remove('y','n'); row.classList.add(val==='yes'?'y':'n');
  row.querySelectorAll('.yb').forEach(b=>b.classList.remove('s'));
  row.querySelector('.yb.'+(val==='yes'?'y':'n')).classList.add('s');
  updateProg(); updatePills();
}

function triggerCam(qid){ document.getElementById('fi-'+qid).click(); }
function addPhoto(inp, qid){
  if(!inp.files.length) return;
  if(!PHOTOS[qid]) PHOTOS[qid]=[];
  var reader = new FileReader();
  reader.onload = e => {
    var img = new Image();
    img.onload = () => {
      var cv = document.createElement('canvas');
      var MAX = 800; var w = img.width, h = img.height;
      if(w>h){ if(w>MAX){h*=MAX/w; w=MAX;} } else { if(h>MAX){w*=MAX/h; h=MAX;} }
      cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      PHOTOS[qid].push(cv.toDataURL('image/jpeg',0.7));
      document.getElementById('cb-'+qid).classList.add('has');
      document.getElementById('th-'+qid).innerHTML = PHOTOS[qid].map(p=>`<img src="${p}">`).join('');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(inp.files[0]);
}

function updateProg(){
  var a=Object.keys(ANS).length, t=10, p=Math.round(a/t*100);
  document.getElementById('ansCnt').textContent=a;
  document.getElementById('pFill').style.width=p+'%';
  document.getElementById('pPct').textContent='%'+p;
}
function updatePills(){
  CATS.forEach(cat=>{
    var done=cat.questions.filter((_,i)=>ANS[cat.id+'-'+i]).length;
    document.getElementById('pill-'+cat.id).textContent=done+'/'+cat.questions.length;
    if(done===cat.questions.length) document.getElementById('pill-'+cat.id).classList.add('done');
  });
}
function toggleCat(hd,id){ document.getElementById('bd-'+id).classList.toggle('open'); hd.classList.toggle('open'); }

async function submitForm(){
  updateDateTime();
  var mudur=v('f-mudur'), magaza=v('f-magaza'), magMudur=v('f-mag-mudur'), notlar=v('f-notlar');
  if(!mudur || !magaza || !magMudur){ toast('Eksik bilgi!',true); return; }
  if(Object.keys(ANS).length < 10){ toast('Tüm soruları cevaplayın!',true); return; }
  if(notlar.length < 20){ toast('Notlar en az 20 karakter olmalı!',true); return; }

  for(var qid in ANS){
    if(ANS[qid]==='yes' && (!PHOTOS[qid] || PHOTOS[qid].length===0)){ toast('Evet için fotoğraf zorunludur!',true); return; }
    if(ANS[qid]==='no' && !DESC[qid]){ toast('Hayır için açıklama zorunludur!',true); return; }
  }

  document.getElementById('spinOv').style.display='flex';
  await saveToSheets();
  document.getElementById('spinOv').style.display='none';
  document.getElementById('succOv').classList.add('on');
}

async function saveToSheets() {
  const soruCevaplar = [];
  CATS.forEach(cat => { cat.questions.forEach((q, i) => { const qid = cat.id + '-' + i; soruCevaplar.push({ soru: q.t, cevap: ANS[qid] === 'yes' ? 'EVET' : 'HAYIR', not: DESC[qid] || '' }); }); });
  const st = calcStats();
  const payload = {
    tarih: v('f-tarih'), mudur: v('f-mudur'), magaza: v('f-magaza'), mag_mudur: v('f-mag-mudur'), sira: v('f-sira'),
    total: 10, evet: st.yesN, hayir: st.noN, pct: st.pct, uyum: st.uyum, notlar: v('f-notlar'),
    catStats: CATS.map(cat => {
        var cy = cat.questions.filter((_,i)=>ANS[cat.id+'-'+i]==='yes').length;
        var cn = cat.questions.filter((_,i)=>ANS[cat.id+'-'+i]==='no').length;
        return { title: cat.title, u: Math.round(cy/(cy+cn)*100)||0 };
    }),
    soruCevaplar: soruCevaplar 
  };
  try { await fetch(CONFIG.sheets_url, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) }); } catch (e) { console.error(e); }
}

function calcStats(){
  var yesN=Object.values(ANS).filter(a=>a==='yes').length;
  var noN=Object.values(ANS).filter(a=>a==='no').length;
  return {yesN, noN, pct:Math.round(Object.keys(ANS).length/10*100), uyum:Math.round(yesN/(yesN+noN)*100)||0};
}

function showReport(){
  const st = calcStats();
  const catResults = CATS.map(cat => {
      var cy = cat.questions.filter((_,i)=>ANS[cat.id+'-'+i]==='yes').length;
      var cn = cat.questions.filter((_,i)=>ANS[cat.id+'-'+i]==='no').length;
      var pct = Math.round(cy/(cy+cn)*100)||0;
      var color = pct >= 80 ? '#3d7a5a' : pct >= 50 ? '#c8a97e' : '#b84040';
      return `<div class="rpt-cat-item">
        <div class="rpt-cat-info"><span>${cat.title}</span><span>%${pct}</span></div>
        <div class="rpt-bar-bg"><div class="rpt-bar-fill" style="width:${pct}%; background:${color}"></div></div>
      </div>`;
  }).join('');

  let h = `<div class="rpt-hd"><h2>Checklist Özeti</h2><p>${v('f-magaza')} | ${v('f-mudur')}</p></div>
    <div class="rpt-scores">
      <div class="rsc"><div class="rv" style="color:var(--grn)">${st.yesN}</div><div class="rl">Evet</div></div>
      <div class="rsc"><div class="rv" style="color:var(--red)">${st.noN}</div><div class="rl">Hayır</div></div>
      <div class="rsc"><div class="rv" style="color:#2471a3">%${st.uyum}</div><div class="rl">Uyum</div></div>
    </div>
    <div style="margin-top:20px">${catResults}</div>
    <button class="btn-sub" style="margin-top:30px; padding:12px" onclick="closeReport()">Raporu Kapat</button>`;
  document.getElementById('rptInner').innerHTML = h;
  document.getElementById('rptPage').classList.add('on');
}
function closeReport(){ document.getElementById('rptPage').classList.remove('on'); }

function updateDateTime(){
  var n=new Date(); 
  var d = n.getDate().toString().padStart(2,'0')+'.'+(n.getMonth()+1).toString().padStart(2,'0')+'.'+n.getFullYear()+' '+n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  document.getElementById('f-tarih').value = d;
  document.getElementById('f-tarih-display').textContent = d;
}
function hesaplaSira(){
  var m=v('f-mudur'), z=v('f-magaza'); if(!m || !z) return;
  fetch(CONFIG.sheets_url+'?action=sira&mudur='+m+'&magaza='+z+'&yil='+new Date().getFullYear()).then(r=>r.json()).then(data=>{
    var s = (data.count||0)+1 + '. Ziyaret';
    document.getElementById('f-sira').value = s; document.getElementById('f-sira-display').textContent = s;
  });
}
function resetFormWithConfirm(){ if(confirm('Tüm formu temizlemek istediğinize emin misiniz?')) location.reload(); }
function renderChips(){ document.getElementById('chips').innerHTML = mailList.map(m=>`<div class="chip">✉ ${m.a}</div>`).join(''); }
function addMail(){ var i=document.getElementById('mailInp'); if(i.value.includes('@')){ mailList.push({a:i.value}); i.value=''; renderChips(); } }
function v(id){ var el=document.getElementById(id); return el?el.value:'' }
function toast(m,e){ var t=document.getElementById('toast'); t.textContent=m; t.className='toast on'+(e?' err':''); setTimeout(()=>t.classList.remove('on'),3000); }

document.addEventListener('DOMContentLoaded', ()=>{ 
  render(); updateDateTime(); 
  document.getElementById('f-mudur').addEventListener('change', hesaplaSira);
  document.getElementById('f-magaza').addEventListener('change', hesaplaSira);
});
</script>
</body>
</html>
