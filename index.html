<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Karaca Züccaciye – Mağaza Ziyaret Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --bg:#f4f0eb;--white:#fff;
  --clay:#c8a97e;--clay-l:#e8d5bb;--clay-d:#9c7a52;
  --ink:#1e1a16;--ink-s:#8a7a6a;
  --bdr:#ddd4c6;
  --grn:#3d7a5a;--grn-b:#edf7f2;
  --red:#b84040;--red-b:#fdf0f0;
  --ylw:#fdf8ee;
  --s1:0 2px 12px rgba(30,26,22,.07);
  --s2:0 6px 28px rgba(30,26,22,.12);
  --s3:0 20px 60px rgba(30,26,22,.22);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{-webkit-tap-highlight-color:transparent}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--ink);padding-bottom:100px}

/* ─ HEADER ─ */
.hdr{background:var(--ink);position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;border:50px solid rgba(200,169,126,.05);pointer-events:none}
.hdr-in{max-width:980px;margin:0 auto;padding:36px 20px 28px;position:relative;z-index:2;display:flex;justify-content:space-between;align-items:flex-end;gap:16px}
.hdr-logo{display:inline-flex;align-items:center;gap:7px;background:rgba(200,169,126,.15);border:1px solid rgba(200,169,126,.28);border-radius:20px;padding:4px 12px;margin-bottom:13px}
.hdr-logo span{font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--clay-l)}
.hdr h1{font-family:'Playfair Display',serif;font-size:28px;color:#fff;line-height:1.2}
.hdr h1 em{color:var(--clay);font-style:italic}
.hdr-sub{color:var(--ink-s);font-size:12px;margin-top:7px;font-weight:300}
.hdr-date{background:rgba(200,169,126,.1);border:1px solid rgba(200,169,126,.22);border-radius:10px;padding:9px 16px;text-align:center;flex-shrink:0}
.hdr-date .dd{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-s);margin-bottom:3px}
.hdr-date .dt{font-family:'Playfair Display',serif;font-size:16px;color:var(--clay-l)}

/* ADMIN BADGE */
.admin-badge{position:fixed;top:12px;right:12px;z-index:1000;display:flex;align-items:center;gap:6px;background:var(--clay);color:var(--ink);border:none;border-radius:20px;padding:6px 14px;font-family:'Lato',sans-serif;font-size:11px;font-weight:700;cursor:pointer;box-shadow:var(--s2);transition:all .18s}

/* ─ WRAPPER ─ */
.W{max-width:980px;margin:0 auto;padding:0 12px}

/* ─ KART ─ */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--s2);overflow:hidden;margin-top:18px}
.card-hd{background:linear-gradient(135deg,var(--ink),#2d261e);padding:14px 20px;display:flex;align-items:center;gap:10px}
.card-hd h2{font-family:'Playfair Display',serif;font-size:15px;color:#fff;flex:1;font-weight:600}
.card-body{padding:20px}

/* ─ FORM ALANLARI ─ */
.mg{display:grid;gap:13px;margin-bottom:13px}
.mg3{grid-template-columns:1fr 1.2fr 1fr} /* Mağaza ismine biraz daha yer verdik */
.mg2{grid-template-columns:1fr 1fr}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:10px;font-weight:700;color:var(--ink-s);letter-spacing:1.5px;text-transform:uppercase}
.fld input,.fld select,.fld textarea{border:1.5px solid var(--bdr);border-radius:8px;padding:9px 12px;font-family:'Lato',sans-serif;font-size:14px;color:var(--ink);background:var(--bg);outline:none;transition:all .18s;-webkit-appearance:none;appearance:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--clay);background:#fff;box-shadow:0 0 0 3px rgba(200,169,126,.13)}

/* ─ PROGRESS ─ */
.prog{background:var(--white);border-radius:var(--r);box-shadow:var(--s1);padding:15px 20px;margin-top:14px;display:flex;align-items:center;gap:14px}
.prog-info{min-width:140px}
.prog-lbl{font-size:9.5px;font-weight:700;color:var(--ink-s);letter-spacing:1px;text-transform:uppercase}
.prog-num{font-family:'Playfair Display',serif;font-size:22px;color:var(--clay-d);margin-top:1px}
.prog-track{flex:1;height:8px;background:var(--bdr);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--clay-d),var(--clay));transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}
.prog-pct{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--clay);min-width:44px;text-align:right}

/* ─ KATEGORİ ─ */
.cat{margin-top:14px;border-radius:var(--r);overflow:hidden;box-shadow:var(--s1)}
.cat-hd{background:var(--white);border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .15s}
.cat-hd-in{padding:12px 16px;display:flex;align-items:center;gap:10px}
.cat-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cat-txt{flex:1;min-width:0}
.cat-txt h3{font-family:'Playfair Display',serif;font-size:13.5px;font-weight:600;color:var(--ink)}
.cat-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--bg);color:var(--ink-s);border:1.5px solid var(--bdr)}
.cat-pill.done{background:var(--grn-b);color:var(--grn);border-color:#b0d9c4}
.cat-chev{font-size:13px;color:var(--ink-s);transition:transform .3s}
.cat-hd.open .cat-chev{transform:rotate(180deg)}
.cat-bd{background:var(--white);display:none}
.cat-bd.open{display:block}

/* ─ TABLO ─ */
.th-row{display:grid;background:#f0ebe3;border-bottom:2px solid var(--bdr);padding:7px 0; grid-template-columns:32px 1fr 90px 1fr 60px}
.th-row span{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-s);padding:0 6px}
.qr{display:grid;border-bottom:1px solid var(--bdr); grid-template-columns:32px 1fr 90px 1fr 60px}
.qr.y{border-left:3px solid var(--grn);background:#f9fdfa}
.qr.n{border-left:3px solid var(--red);background:#fefafa}
.qn{font-size:10px;font-weight:700;color:var(--ink-s);text-align:center;padding-top:16px}
.qt{font-size:13px;padding:13px 10px}
.yn{display:flex;gap:7px;padding:12px 4px;justify-content:center}
.yb{width:36px;height:36px;border-radius:50%;border:2px solid var(--bdr);background:transparent;cursor:pointer;font-weight:700;color:var(--ink-s);transition:all .15s}
.yb.y.s{background:var(--grn);border-color:var(--grn);color:#fff}
.yb.n.s{background:var(--red);border-color:var(--red);color:#fff}
.dc{padding:8px 4px}
.dc input{width:100%;border:1.5px solid var(--bdr);border-radius:7px;padding:7px 9px;font-size:13px}
.pc{padding:8px 4px;display:flex;flex-direction:column;align-items:center}
.cam-btn{width:44px;height:44px;border-radius:10px;border:2px dashed var(--bdr);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.cam-btn.has{border-style:solid;border-color:var(--grn);background:var(--grn-b)}
.cam-cnt{font-size:9px;color:var(--ink-s);margin-top:2px}
.thumbs img{width:40px;height:40px;border-radius:5px;object-fit:cover;border:1.5px solid var(--bdr);margin:2px}

/* ─ MAİL & GÖNDER ─ */
.send-wrap{margin-top:16px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start}
.mail-card{background:var(--white);border-radius:var(--r);box-shadow:var(--s1);overflow:hidden}
.mail-hd{background:#f0ebe3;padding:11px 17px;font-size:10.5px;font-weight:700;color:var(--ink-s);text-transform:uppercase}
.mail-bd{padding:13px 17px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{background:var(--bg);border:1.5px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:11.5px}
.btn-sub-wrap{display:flex;flex-direction:column;gap:9px;min-width:180px}
.btn-preview{background:var(--white);color:var(--clay-d);border:1.5px solid var(--clay);border-radius:var(--r);padding:11px;font-weight:700;cursor:pointer}
.btn-sub{background:linear-gradient(160deg,#1e1a16 0%,#2d261e 50%,#1a150e 100%);color:#fff;border-radius:var(--r);border:none;cursor:pointer;height:100%;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--s2)}
.btn-sub .bi{font-size:26px;margin-bottom:4px}

/* ─ RAPOR SAYFASI ─ */
.rpt-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:350;overflow-y:auto;padding:20px 12px}
.rpt-page.on{display:block}
.rpt-inner{max-width:780px;margin:0 auto;background:#fff;border-radius:14px;padding:24px;box-shadow:var(--s3)}
.rpt-hd{background:var(--ink);color:#fff;padding:20px;border-radius:12px;margin-bottom:16px}
.rpt-scores{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.rsc{background:var(--white);border-radius:11px;padding:14px;text-align:center;box-shadow:var(--s1);border:1px solid var(--bdr)}
.rsc .rv{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
.rsc .rl{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink-s)}

/* ─ SUCCESS MODAL ─ */
.sov{display:none;position:fixed;inset:0;background:rgba(30,26,22,.7);z-index:500;align-items:center;justify-content:center}
.sov.on{display:flex}
.smodal{background:#fff;border-radius:16px;width:92%;max-width:460px;overflow:hidden;box-shadow:var(--s3)}
.sm-hd{background:linear-gradient(135deg,var(--ink),#2d261e);padding:26px;text-align:center;color:#fff}
.sm-ft{padding:20px;display:flex;gap:10px}
.btn-smc{flex:1;background:var(--clay);color:#1e1a16;border:none;border-radius:9px;padding:12px;font-weight:700;cursor:pointer}
.btn-smn{flex:1;background:var(--ink);color:#fff;border:none;border-radius:9px;padding:12px;font-weight:700;cursor:pointer}

@media(max-width:600px){
  .mg3{grid-template-columns:1fr}
  .th-row{grid-template-columns:26px 1fr 86px 46px}
  .qr{grid-template-columns:26px 1fr 86px 46px; align-items:center}
  .qr .dc{grid-column: 1 / -1; padding-left: 26px}
  .send-wrap{grid-template-columns:1fr}
  .btn-sub-wrap{flex-direction:row}
  .rpt-scores{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div>
      <div class="hdr-logo"><span>✦ Karaca Züccaciye</span></div>
      <h1>Mağaza Ziyaret<br><em>Checklist</em></h1>
    </div>
    <div class="hdr-date">
      <div class="dd">Bugün</div>
      <div class="dt" id="hdrDate">—</div>
    </div>
  </div>
</header>

<div class="W">
<!-- ZİYARET BİLGİLERİ -->
<div class="card">
  <div class="card-hd"><h2>📋 Ziyaret Bilgileri</h2></div>
  <div class="card-body">
    <div class="mg mg3">
      <div class="fld"><label>Bölge Müdürü</label><select id="f-mudur" class="native-sel"><option value="">-- Seçiniz --</option><option value="AYDIN EROĞLU">AYDIN EROĞLU</option><option value="BAHRETTİN BAŞAR">BAHRETTİN BAŞAR</option><option value="BAYRAM ERCAN KARINDAŞ">BAYRAM ERCAN KARINDAŞ</option><option value="ENİS NACİ DUĞAN">ENİS NACİ DUĞAN</option><option value="ERMAN KARAKAYA">ERMAN KARAKAYA</option><option value="FERHAT GENCER">FERHAT GENCER</option><option value="HASAN AYDIN">HASAN AYDIN</option><option value="HÜSEYİN ÖZDEMİR">HÜSEYİN ÖZDEMİR</option><option value="MURAT TİRYAKİ">MURAT TİRYAKİ</option><option value="NİYAZİ KUZAN">NİYAZİ KUZAN</option><option value="OSMAN ASKER">OSMAN ASKER</option><option value="SEDAT AYGÜN">SEDAT AYGÜN</option><option value="SERPİL DURAN">SERPİL DURAN</option><option value="TANER DURAK">TANER DURAK</option><option value="TANER PEHLİVAN">TANER PEHLİVAN</option><option value="ŞÜKRÜ ALPER ERGÜN">ŞÜKRÜ ALPER ERGÜN</option></select></div>
      <div class="fld"><label>Mağaza Adı</label><select id="f-magaza" class="native-sel"><option value="">-- Seçiniz --</option><option value="ADA.ADANACADDE-CONT.KRC.2025">ADA.ADANACADDE-CONT.KRC.2025</option><option value="AMS.AMASYA.CADDE.KRC.2025">AMS.AMASYA.CADDE.KRC.2025</option><option value="Afy.Park Krc.2015">Afy.Park Krc.2015</option><option value="Ank.Ankamall Krc.2011">Ank.Ankamall Krc.2011</option><option value="Ist.Optimum Krc.2010">Ist.Optimum Krc.2010</option></select></div>
      <div class="fld"><label>Mağaza Müdürü</label><input type="text" id="f-mag-mudur" placeholder="Sorumlu kişi"></div>
    </div>
    <div class="mg mg2">
      <div class="fld"><label>Ziyaret Tarihi & Saati</label><div id="f-tarih-display" style="background:#f0ebe3; padding:9px; border-radius:8px">—</div><input type="hidden" id="f-tarih"></div>
      <div class="fld"><label>Bu Yıl Kaçıncı Ziyaret</label><div id="f-sira-display" style="background:#f0ebe3; padding:9px; border-radius:8px">Seçim yapınız</div><input type="hidden" id="f-sira"></div>
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div class="prog">
  <div class="prog-info"><div class="prog-lbl">Tamamlanma</div><div class="prog-num"><span id="ansCnt">0</span><small> / <span id="totCnt">10</span></small></div></div>
  <div class="prog-track"><div class="prog-fill" id="pFill"></div></div>
  <div class="prog-pct" id="pPct">%0</div>
</div>

<div id="catWrap"></div>

<!-- NOTLAR -->
<div class="notes-card">
  <div class="notes-hd">📝 Genel Gözlem & Aksiyon Planı</div>
  <div class="notes-bd"><textarea id="f-notlar" placeholder="Gözlemler, öneriler, acil aksiyonlar… (En az 20 karakter)" style="width:100%; min-height:80px; border:1.5px solid var(--bdr); border-radius:8px; padding:10px"></textarea></div>
</div>

<!-- GÖNDER -->
<div class="send-wrap">
  <div class="mail-card">
    <div class="mail-hd">✉️ Rapor Gönderilecek Kişiler</div>
    <div class="mail-bd">
      <div class="chips" id="chips"></div>
      <div style="display:flex; gap:7px"><input type="email" id="mailInp" placeholder="ad@karaca.com" style="flex:1; border:1.5px solid var(--bdr); border-radius:7px; padding:8px"><button onclick="addMail()" style="background:var(--clay); border:none; border-radius:7px; padding:0 12px; cursor:pointer">+</button></div>
    </div>
  </div>
  <div class="btn-sub-wrap">
    <button class="btn-preview" onclick="showReport()">📊 Raporu Önizle</button>
    <button class="btn-preview" onclick="window.print()" style="background:var(--grn-b);color:var(--grn);border-color:var(--grn)">⬇️ PDF İndir</button>
    <button class="btn-sub" onclick="submitForm()"><span class="bi">📨</span><span style="font-weight:700">Formu Tamamla</span><span style="font-size:10px; opacity:0.7">& Raporu Gönder</span></button>
  </div>
</div>
</div>

<!-- MODALLER -->
<div class="rpt-page" id="rptPage">
  <div class="rpt-inner" id="rptInner"></div>
</div>

<div class="sov" id="succOv">
  <div class="smodal">
    <div class="sm-hd"><h2>✅ Rapor Gönderildi!</h2><p>Başarıyla Drive'a ve Sheets'e kaydedildi.</p></div>
    <div class="sm-stats" id="sm-stats-box" style="padding:20px; display:grid; grid-template-columns:repeat(2,1fr); gap:10px"></div>
    <div class="sm-ft">
      <button class="btn-smc" onclick="document.getElementById('succOv').classList.remove('on')">Kapat</button>
      <button class="btn-smn" onclick="location.reload()">Yeni Form</button>
    </div>
  </div>
</div>

<div class="spin-ov" id="spinOv"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  sheets_url: 'https://script.google.com/macros/s/AKfycbxlaoRObf7GCVmLPbom4ye_k5-K1VMMUNQQ2Z4Met5EaK70jg2MCRneygao4pHTiJU-/exec',
  default_mails: [{a:'aydin.eroglu@karaca.com'}, {a:'operasyon@karaca.com'}]
};

var CATS = [
  {id:'c1',icon:'🏬',col:'#e8f4fd',icol:'#2980b9', title:'Mağaza Dış Görünüm ve Genel Alanlar', questions:[
    {t:'Dış cephe temiz ve düzenli mi? Tabela ışıkları yanıyor mu?'},
    {t:'Mağaza yürüyüş alanı düzenli mi? (Koli/ürün bulunmuyor ve zemin temiz.)'},
    {t:'Mağaza içi depolama alanları düzenli mi? Depo standartlara uygun mu?'},
    {t:'Kasa bölgesi temiz ve düzenli mi?'},
    {t:'Mağazada yeterli sarf malzeme mevcut mu?'},
  ]},
  {id:'c2',icon:'💰',col:'#fef9ee',icol:'#c9a84c', title:'Kasa, Finans ve Evrak İşlemleri', questions:[
    {t:'Kasa nakiti tutarlı mı? Gider pusulaları prosedüre uygun mu?'},
    {t:'Para yatırma şirket prosedürüne uygun yapılıyor mu?'},
    {t:'Masraflar BM onaylı ve prosedüre uygun işlenmiş mi?'},
    {t:'Sevkiyatların kabulü yapılmış mı? İrsaliyeler imzalı muhafaza ediliyor mu?'},
    {t:'Mağazalar arası transfer irsaliyeleri imzalanıp dosyalanıyor mu?'},
  ]},
];

var ANS={}, DESC={}, PHOTOS={}, SEL_VAL={mudur:'', magaza:''};
var mailList = CONFIG.default_mails.map(m=>({a:m.a}));

function render(){
  var wrap = document.getElementById('catWrap'); wrap.innerHTML = '';
  CATS.forEach(cat => {
    var div = document.createElement('div'); div.className='cat';
    let qRows = '';
    cat.questions.forEach((q,i) => {
      var qid = cat.id+'-'+i;
      qRows += `<div class="qr" id="r-${qid}">
        <div class="qn">${i+1}</div>
        <div class="qt">${q.t}</div>
        <div class="yn"><button class="yb y" onclick="setA('${qid}','yes')">E</button><button class="yb n" onclick="setA('${qid}','no')">H</button></div>
        <div class="dc"><input type="text" placeholder="Açıklama..." oninput="DESC['${qid}']=this.value"></div>
        <div class="pc"><div class="cam-btn" id="cb-${qid}" onclick="triggerCam('${qid}')">📷</div><input type="file" class="cam-input" id="fi-${qid}" accept="image/*" capture="environment" onchange="addPhoto(this,'${qid}')"><div class="thumbs" id="th-${qid}"></div></div>
      </div>`;
    });
    div.innerHTML = `<div class="cat-hd open" onclick="toggleCat(this,'${cat.id}')"><div class="cat-hd-in"><div class="cat-dot" style="background:${cat.col};color:${cat.icol}">${cat.icon}</div><div class="cat-txt"><h3>${cat.title}</h3></div><div class="cat-pill" id="pill-${cat.id}">0/${cat.questions.length}</div><span class="cat-chev">▾</span></div></div><div class="cat-bd open" id="bd-${cat.id}"><div class="th-row"><span>#</span><span>Madde</span><span style="text-align:center">Cevap</span><span>Açıklama</span><span style="text-align:center">Foto</span></div>${qRows}</div>`;
    wrap.appendChild(div);
  });
  renderChips();
}

function setA(qid,val){
  ANS[qid]=val;
  var row = document.getElementById('r-'+qid);
  row.classList.remove('y','n'); row.classList.add(val==='yes'?'y':'n');
  row.querySelectorAll('.yb').forEach(b=>b.classList.remove('s'));
  row.querySelector('.yb.'+(val==='yes'?'y':'n')).classList.add('s');
  updateProg(); updatePills();
}

function triggerCam(qid){ document.getElementById('fi-'+qid).click(); }
function addPhoto(inp, qid){
  if(!inp.files.length) return;
  if(!PHOTOS[qid]) PHOTOS[qid]=[];
  var reader = new FileReader();
  reader.onload = e => {
    var img = new Image();
    img.onload = () => {
      var canvas = document.createElement('canvas');
      var MAX = 800; var w = img.width, h = img.height;
      if(w>h){ if(w>MAX){h*=MAX/w; w=MAX;} } else { if(h>MAX){w*=MAX/h; h=MAX;} }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      PHOTOS[qid].push(canvas.toDataURL('image/jpeg',0.7));
      document.getElementById('cb-'+qid).classList.add('has');
      document.getElementById('th-'+qid).innerHTML = PHOTOS[qid].map(p=>`<img src="${p}">`).join('');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(inp.files[0]);
}

function updateProg(){
  var a=Object.keys(ANS).length, t=10, p=Math.round(a/t*100);
  document.getElementById('ansCnt').textContent=a;
  document.getElementById('pFill').style.width=p+'%';
  document.getElementById('pPct').textContent='%'+p;
}
function updatePills(){
  CATS.forEach(cat=>{
    var done=cat.questions.filter((_,i)=>ANS[cat.id+'-'+i]).length;
    document.getElementById('pill-'+cat.id).textContent=done+'/'+cat.questions.length;
    if(done===cat.questions.length) document.getElementById('pill-'+cat.id).classList.add('done');
  });
}
function toggleCat(hd,id){ document.getElementById('bd-'+id).classList.toggle('open'); hd.classList.toggle('open'); }

async function submitForm(){
  updateDateTime();
  var mudur=v('f-mudur'), magaza=v('f-magaza'), magMudur=v('f-mag-mudur'), notlar=v('f-notlar');
  if(!mudur || !magaza || !magMudur){ toast('Ziyaret bilgilerini doldurun!',true); return; }
  if(Object.keys(ANS).length < 10){ toast('Tüm soruları cevaplayın!',true); return; }
  if(notlar.length < 20){ toast('Genel gözlem en az 20 karakter olmalı!',true); return; }

  for(var qid in ANS){
    if(ANS[qid]==='yes' && (!PHOTOS[qid] || PHOTOS[qid].length===0)){ toast('Evet için fotoğraf zorunludur!',true); return; }
    if(ANS[qid]==='no' && !DESC[qid]){ toast('Hayır için açıklama zorunludur!',true); return; }
  }

  document.getElementById('spinOv').classList.add('on');
  await saveToSheets();
  document.getElementById('spinOv').classList.remove('on');
  
  const st = calcStats();
  document.getElementById('sm-stats-box').innerHTML = `<div class="rsc"><div class="rv">${st.yesN}</div><div class="rl">Evet</div></div><div class="rsc"><div class="rv">${st.noN}</div><div class="rl">Hayır</div></div>`;
  document.getElementById('succOv').classList.add('on');
}

async function saveToSheets() {
  const soruCevaplar = [];
  CATS.forEach(cat => { cat.questions.forEach((q, i) => { const qid = cat.id + '-' + i; soruCevaplar.push({ soru: q.t, cevap: ANS[qid] === 'yes' ? 'EVET' : 'HAYIR', not: DESC[qid] || '' }); }); });
  const st = calcStats();
  const payload = {
    tarih: v('f-tarih'), mudur: v('f-mudur'), magaza: v('f-magaza'), mag_mudur: v('f-mag-mudur'), sira: v('f-sira'),
    total: 10, evet: st.yesN, hayir: st.noN, pct: st.pct, uyum: st.uyum, notlar: v('f-notlar'),
    catStats: CATS.map(cat => ({ title: cat.title, u: Math.round(cat.questions.filter((_,i)=>ANS[cat.id+'-'+i]==='yes').length / cat.questions.length * 100) })),
    soruCevaplar: soruCevaplar 
  };
  try { await fetch(CONFIG.sheets_url, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) }); } catch (e) { console.error(e); }
}

function calcStats(){
  var yesN=Object.values(ANS).filter(a=>a==='yes').length;
  var noN=Object.values(ANS).filter(a=>a==='no').length;
  return {yesN, noN, pct:Math.round(Object.keys(ANS).length/10*100), uyum:Math.round(yesN/(yesN+noN)*100)||0};
}

function showReport(){
  const st = calcStats();
  let h = `<button class="rpt-close-btn" onclick="closeReport()">← Geri</button>
    <div class="rpt-hd"><h2>${v('f-magaza')}</h2><p>${v('f-mudur')} | ${v('f-tarih')}</p></div>
    <div class="rpt-scores"><div class="rsc"><div class="rv">${st.yesN}</div><div class="rl">Evet</div></div><div class="rsc"><div class="rv">${st.noN}</div><div class="rl">Hayır</div></div><div class="rsc"><div class="rv">%${st.uyum}</div><div class="rl">Uyum</div></div></div>`;
  CATS.forEach(c => {
    h += `<div style="margin-top:20px; border-bottom:1px solid #ddd; padding-bottom:5px"><b>${c.title}</b></div>`;
    c.questions.forEach((q,i) => { h += `<p style="font-size:12px; margin:5px 0">${i+1}. ${q.t} -> <b>${ANS[c.id+'-'+i]==='yes'?'EVET':'HAYIR'}</b></p>`; });
  });
  document.getElementById('rptInner').innerHTML = h;
  document.getElementById('rptPage').classList.add('on');
}
function closeReport(){ document.getElementById('rptPage').classList.remove('on'); }

function updateDateTime(){
  var n=new Date(); 
  var d = n.getDate().toString().padStart(2,'0')+'.'+(n.getMonth()+1).toString().padStart(2,'0')+'.'+n.getFullYear()+' '+n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  document.getElementById('f-tarih').value = d;
  document.getElementById('f-tarih-display').textContent = d;
}
function hesaplaSira(){
  var m=v('f-mudur'), z=v('f-magaza'); if(!m || !z) return;
  fetch(CONFIG.sheets_url+'?action=sira&mudur='+m+'&magaza='+z+'&yil='+new Date().getFullYear()).then(r=>r.json()).then(data=>{
    var s = (data.count||0)+1 + '. Ziyaret';
    document.getElementById('f-sira').value = s; document.getElementById('f-sira-display').textContent = s;
  });
}
function renderChips(){ document.getElementById('chips').innerHTML = mailList.map(m=>`<div class="chip">✉ ${m.a}</div>`).join(''); }
function addMail(){ var i=document.getElementById('mailInp'); if(i.value.includes('@')){ mailList.push({a:i.value}); i.value=''; renderChips(); } }
function mkd(e){ if(e.key==='Enter') addMail(); }
function v(id){ var el=document.getElementById(id); return el?el.value:'' }
function toast(m,e){ var t=document.getElementById('toast'); t.textContent=m; t.className='toast on'+(e?' err':''); setTimeout(()=>t.classList.remove('on'),3000); }
function adminToggle(){}

document.addEventListener('DOMContentLoaded', ()=>{ 
  render(); updateDateTime(); 
  document.getElementById('f-mudur').addEventListener('change', hesaplaSira);
  document.getElementById('f-magaza').addEventListener('change', hesaplaSira);
});
</script>
</body>
